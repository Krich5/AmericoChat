<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Americo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body, html { height: 100%; }

    body {
      background: url('landingpage.png') center/cover no-repeat;
      height: 100vh;
    }

    /* Gear button — top right */
    .gear-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.45);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      transition: background 0.15s;
    }
    .gear-btn:hover { background: rgba(0,0,0,0.7); }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 64px;
      right: 16px;
      z-index: 9998;
      background: white;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      width: 280px;
      overflow: hidden;
    }
    .modal.open { display: block; }

    .modal-head {
      background: #003366;
      color: white;
      padding: 0.75rem 1rem;
      font-family: sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .modal-body { padding: 1rem; font-family: sans-serif; }

    .modal-body label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
      margin-top: 0.75rem;
    }

    .modal-body label:first-child { margin-top: 0; }

    .modal-body input {
      width: 100%;
      font-size: 0.85rem;
      padding: 0.5rem 0.7rem;
      border: 1.5px solid #dce3ed;
      border-radius: 5px;
      outline: none;
    }

    .modal-body input:focus { border-color: #003366; }

    .modal-btn {
      margin-top: 1rem;
      width: 100%;
      background: #003366;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: sans-serif;
    }
    .modal-btn:hover { background: #002244; }

    .modal-status {
      display: none;
      margin-top: 0.6rem;
      font-size: 0.75rem;
      font-family: monospace;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      background: #e6f5ed;
      color: #1a7f4b;
      border: 1px solid #a3d9bc;
    }
  </style>
</head>
<body>

<!-- Gear icon -->
<button class="gear-btn" onclick="document.querySelector('.modal').classList.toggle('open')">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<!-- Modal -->
<div class="modal">
  <div class="modal-head">Chat Test — Portal Data</div>
  <div class="modal-body">
    <label>Name</label>
    <input type="text" id="inputName" placeholder="e.g. Jane Smith"/>
    <label>Policy / Account Number</label>
    <input type="text" id="inputAccount" placeholder="e.g. POL-00123456"/>
    <button class="modal-btn" onclick="injectAndLaunch()">Inject &amp; Launch</button>
    <div class="modal-status" id="status"></div>
  </div>
</div>

<!-- Webex chat div — DO NOT MODIFY -->
<div id="divicw"
  data-bind="3B277380-AE8A-4420-9477-6CE45DCF3649"
  data-org=""
  data-guid="cf2debdb-56ab-4457-8cb8-dd6c6fed2b41">
</div>

<script>
  function injectAndLaunch() {
    var name = document.getElementById('inputName').value.trim();
    var acct = document.getElementById('inputAccount').value.trim();
    var s    = document.getElementById('status');

    if (!name || !acct) { alert('Enter both fields.'); return; }

    s.style.display = 'block';
    s.textContent = '✓ ' + JSON.stringify({ name: name, accountNumber: acct });

    // Load the Cisco widget script once
    if (!window._widgetLoaded) {
      window._widgetLoaded = true;

      var t = document.createElement('script');
      t.src = 'https://media.imi.chat/widget/js/imichatinit.js?t=' + new Date().toISOString();
      document.getElementById('divicw').insertAdjacentElement('afterend', t);
    }

    // Wait for widget to be ready, then pass data via imichatwidget.init()
    var wait = setInterval(function() {
      if (typeof imichatwidget === 'undefined') return;
      if (typeof imichatwidget.on === 'undefined') return;
      clearInterval(wait);

      imichatwidget.on('imichat-widget:ready', function() {
        imichatwidget.init(JSON.stringify({
          custom_chat_fields: {
            name: name,
            accountNumber: acct
          }
        }), function() {});
      });

    }, 250);

    setTimeout(function() { document.querySelector('.modal').classList.remove('open'); }, 1500);
  }
</script>

</body>
</html>
